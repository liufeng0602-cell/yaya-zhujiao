<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>芽芽助教 · AI 任务验收中心</title>
  <style>
    :root{--bg:#07111f;--panel:#101d33;--panel2:#14243f;--text:#f7fbff;--muted:#9db0ca;--cyan:#55efff;--green:#00e676;--yellow:#ffd166;--red:#ff6b81;--line:rgba(255,255,255,.1)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at 20% 0%,#19385f 0,#07111f 42%,#050912 100%);color:var(--text)}
    .shell{max-width:1240px;margin:0 auto;padding:28px 24px 60px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:24px}.kicker{font-weight:900;color:var(--cyan);letter-spacing:.12em;font-size:13px}.top h1{margin:8px 0 8px;font-size:34px;line-height:1.1}.top p{margin:0;color:var(--muted);line-height:1.7}.updated{padding:10px 14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.05);color:var(--muted);white-space:nowrap}.grid{display:grid;grid-template-columns:280px 1fr;gap:18px}.card{background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.score{padding:20px;position:sticky;top:20px}.score-num{font-size:58px;font-weight:1000;line-height:1;color:var(--cyan)}.score-label{font-weight:900;margin-top:8px}.score-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-top:8px}.stats{display:grid;gap:10px;margin-top:16px}.stat{display:flex;justify-content:space-between;align-items:center;padding:12px;border-radius:14px;background:rgba(255,255,255,.05)}.stat span{color:var(--muted);font-size:13px}.stat b{font-size:22px}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:900}.pass{background:rgba(0,230,118,.14);color:var(--green)}.progress,.warn{background:rgba(255,209,102,.15);color:var(--yellow)}.fail{background:rgba(255,107,129,.15);color:var(--red)}.sections{display:grid;gap:14px}.section{padding:18px}.section-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.section h2{margin:0;font-size:22px}.result{font-size:16px;line-height:1.8;margin:14px 0;color:#eaf5ff}.subgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.box{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:14px;padding:14px}.box h3{font-size:14px;margin:0 0 8px;color:var(--cyan)}ul{margin:0;padding-left:18px;color:var(--muted);line-height:1.8}.question{margin-top:12px;padding:14px;border-radius:14px;background:rgba(85,239,255,.08);border:1px solid rgba(85,239,255,.16);font-weight:800}.recommend{margin-top:10px;color:var(--yellow);font-weight:900}.actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}.btn,.file-btn{appearance:none;border:0;border-radius:12px;padding:12px 16px;font-weight:900;cursor:pointer;background:var(--cyan);color:#031018}.btn.secondary,.file-btn{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}.prompt{margin-top:12px;display:none;background:#020711;border:1px solid var(--line);border-radius:14px;padding:14px;color:#dffaff;line-height:1.7;white-space:pre-wrap}.empty{padding:20px;color:var(--muted)}.artifact-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.file-btn{font-size:13px;padding:9px 12px}.preview{margin-top:14px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#020711}.preview-head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 12px;background:rgba(85,239,255,.08);font-weight:900}.preview-body{max-height:420px;overflow:auto;padding:14px}.preview pre{white-space:pre-wrap;word-break:break-word;margin:0;color:#dffaff;line-height:1.6;font-size:13px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;z-index:99;padding:24px}.modal.show{display:flex}.modal-card{max-width:1100px;width:100%;margin:auto;background:#07111f;border:1px solid var(--line);border-radius:20px;box-shadow:0 30px 90px rgba(0,0,0,.55);display:flex;flex-direction:column;max-height:90vh}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}.modal-title{font-weight:1000}.modal-body{padding:18px;overflow:auto}.modal-body pre{white-space:pre-wrap;word-break:break-word;line-height:1.7;color:#eafaff;margin:0}.close{background:rgba(255,255,255,.08);color:white;border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;font-weight:900}@media(max-width:900px){.grid{grid-template-columns:1fr}.top{flex-direction:column}.subgrid{grid-template-columns:1fr}.top h1{font-size:28px}.score{position:static}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top"><div><div class="kicker">ACCEPTANCE CENTER</div><h1 id="title">芽芽助教 · AI 任务验收中心</h1><p id="subtitle">读取中...</p></div><div class="updated" id="updated">更新时间：-</div></div>
    <div class="grid"><aside class="card score"><div class="score-num" id="scoreNum">--</div><div class="score-label" id="scoreLabel">读取中</div><div class="score-desc" id="scoreDesc"></div><div class="stats" id="stats"></div></aside><section><div class="sections" id="sections"><div class="card empty">正在加载验收数据...</div></div><div class="actions" id="actions"></div><div class="prompt" id="promptBox"></div></section></div>
  </main>
  <div class="modal" id="fileModal"><div class="modal-card"><div class="modal-head"><div class="modal-title" id="modalTitle">文件内容</div><button class="close" onclick="closeModal()">关闭</button></div><div class="modal-body"><pre id="modalContent">读取中...</pre></div></div></div>
  <script>
    const meta={pass:['通过','pass','✅'],done:['通过','pass','✅'],progress:['进行中','progress','🛠️'],warn:['需注意','warn','⚠️'],fail:['不通过','fail','❌'],blocked:['阻塞','fail','🚧']};
    const artifactCache=new Map();
    function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
    function statusPill(s){const m=meta[s]||meta.warn;return `<span class="pill ${m[1]}">${m[2]} ${m[0]}</span>`}
    function showPrompt(text){const box=document.getElementById('promptBox');box.style.display='block';box.textContent=text;box.scrollIntoView({behavior:'smooth',block:'nearest'});navigator.clipboard?.writeText(text).catch(()=>{});}
    async function fetchText(path){ if(artifactCache.has(path)) return artifactCache.get(path); const t=await fetch(path+'?v='+Date.now(),{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status); return r.text()}); artifactCache.set(path,t); return t; }
    async function openArtifact(path,label){ modalTitle.textContent=label||path; modalContent.textContent='读取中...'; fileModal.classList.add('show'); try{ modalContent.textContent=await fetchText(path); }catch(e){ modalContent.textContent='读取失败：'+(e.message||e)+'\n路径：'+path; } }
    function closeModal(){fileModal.classList.remove('show')}
    async function makePreview(artifacts){ const embeds=(artifacts||[]).filter(a=>a.embed).slice(0,2); if(!embeds.length) return ''; let html=''; for(const a of embeds){ let text=''; try{text=await fetchText(a.path)}catch(e){text='读取失败：'+(e.message||e)} if(text.length>12000) text=text.slice(0,12000)+'\n\n……内容较长，已截断。点击上方按钮查看完整文件。'; html += `<div class="preview"><div class="preview-head"><span>${esc(a.label)}</span><button class="file-btn" onclick="openArtifact('${esc(a.path)}','${esc(a.label)}')">查看完整</button></div><div class="preview-body"><pre>${esc(text)}</pre></div></div>`;} return html; }
    async function render(data){ title.textContent=data.title||title.textContent; subtitle.textContent=data.subtitle||''; updated.textContent='更新时间：'+(data.updatedAt||'-'); scoreNum.textContent=data.score?.overall ?? '--'; scoreLabel.textContent=data.score?.label||''; scoreDesc.textContent=data.score?.desc||''; stats.innerHTML=(data.stats||[]).map(s=>`<div class="stat"><span>${esc(s.label)}</span><b>${esc(s.value)}</b></div>`).join('');
      const secHtml=[]; for(const sec of (data.sections||[])){ const artifacts=sec.artifacts||[]; const artifactBtns=artifacts.length?`<div class="artifact-row">${artifacts.map(a=>`<button class="file-btn" onclick="openArtifact('${esc(a.path)}','${esc(a.label)}')">📄 ${esc(a.label)}</button>`).join('')}</div>`:''; const preview=await makePreview(artifacts); secHtml.push(`<article class="card section"><div class="section-head"><h2>${esc(sec.title)}</h2>${statusPill(sec.status)}</div><div class="result">${esc(sec.humanResult)}</div>${artifactBtns}<div class="subgrid"><div class="box"><h3>证据</h3><ul>${(sec.evidence||[]).map(e=>`<li>${esc(e)}</li>`).join('')}</ul></div><div class="box"><h3>你要判断什么</h3><div class="question">${esc(sec.acceptanceQuestion)}</div><div class="recommend">${esc(sec.recommendation)}</div></div></div>${preview}</article>`); }
      sections.innerHTML=secHtml.join(''); actions.innerHTML=(data.actions||[]).map(a=>`<button class="btn" onclick="showPrompt(${JSON.stringify(a.prompt)})">${esc(a.label)}</button>`).join('') + '<button class="btn secondary" onclick="location.reload()">刷新验收数据</button>'; }
    fetch('./acceptance-dashboard.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(render).catch(err=>{sections.innerHTML='<div class="card empty">读取 acceptance-dashboard.json 失败：'+esc(err.message||err)+'</div>'});
  </script>
</body>
</html>
