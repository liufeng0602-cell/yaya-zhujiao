# =============================================================================
# Prompt: prd/l2/recovery_coverage
# 用途：检查异常恢复策略是否覆盖了 6 种核心异常场景
# 消耗：仅在 doc_flags 包含 restoration 时触发
# =============================================================================

main: |
  你是 PRD 审查助手。以下文档声明了涉及异常恢复策略，请检查是否覆盖了以下 6 种核心异常场景：

  1. 请求超时 — 下游接口没有在规定时间内返回
  2. 下游不可用 — 依赖的外部系统完全不可达
  3. 数据不一致 — 分布式环境下数据状态出现冲突
  4. 状态恢复失败 — 恢复操作本身出错或超时
  5. 并发冲突 — 多个请求同时操作同一资源导致冲突
  6. 外部系统波动 — 外部 API 响应变慢或返回异常状态码

  检查要点：
  - 对每个场景，文档是否有明确的恢复策略描述
  - 恢复策略是否包含：检测条件、触发动作、恢复后的状态
  - 如果某个场景不适用，文档是否主动声明了不适用理由

  格式：
  - 场景名称
  - 状态：已覆盖 / 未覆盖 / 不适用（需说明理由）
  - 如果未覆盖：建议补充什么内容

  如果 6 个场景全部覆盖，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---

cross_validate: |
  上一轮检查报告了以下恢复场景的遗漏：{issues}

  请验证这些遗漏是否属实——排除以下干扰：
  - 恢复策略分散在多个章节中，但实际已被定义
  - 某些场景通过系统级默认机制处理而非 PRD 层说明

  对每个遗漏返回：属实 / 不属实 / 需澄清。
