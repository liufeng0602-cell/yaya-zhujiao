# =============================================================================
# Prompt: prd/l2/init_recovery_gap
# 用途：检测涉及状态机/恢复的文档中，是否有未覆盖的初始化或异常恢复场景
# 消耗：仅在 doc_flags 包含 state_machine 或 restoration 时触发
# =============================================================================

main: |
  你是一个 PRD 审查助手。以下文档涉及状态机或异常恢复场景，请检查是否存在
  "未覆盖的初始化默认值或异常恢复策略"。

  检查要点：
  - 每个状态是否有明确的初始默认值
  - 每个可能失败的操作是否有对应的异常恢复策略
  - 异常恢复策略是否定义了"恢复后的状态"
  - 是否存在"异常发生后不知道往哪走"的空白区域

  请逐项列出遗漏，格式：
  - 遗漏的内容
  - 相关位置（章节标题）
  - 建议补充的方向

  如果无遗漏，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---
