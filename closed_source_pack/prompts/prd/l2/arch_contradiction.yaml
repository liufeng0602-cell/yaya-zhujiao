# =============================================================================
# Prompt: prd/l2/arch_contradiction
# 用途：LLM 语义级检查——检测文档中不同章节对同一实体的定义冲突
# 消耗：每文档一次调用，产生 1 个 Issue（或空结果）
# =============================================================================

# main: 主检查 prompt
main: |
  你是一个 PRD 审查助手。请检查以下文档中是否存在"不同章节对同一实体定义冲突"的情况。

  实体可以是：配置项、参数、阈值、默认值、状态、行为描述。

  冲突包括但不限于：
  - 不同章节对同一配置项给出不同的默认值
  - 不同模块对同一条快路径给出不同的超时时间
  - 不同地方对同一状态转换的逻辑描述矛盾

  请逐项列出冲突，格式：
  - 实体名称
  - 冲突的两个位置（章节标题和具体行号或段落）
  - 冲突的描述
  - 建议的统一值

  如果没有冲突，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---

# cross_validate: 交叉验证 prompt（可选，由 cross_validate: true 触发）
cross_validate: |
  上一步报告了以下冲突：
  {issues}

  请交叉验证这些冲突是否属实，排除以下干扰因素：
  - 一个章节描述的是"A 模块的超时"，另一个是"B 模块的超时"——这是不同的实体，不冲突
  - 一个章节说的是"最大值"，另一个是"推荐值"——这是不同语义，需要区分

  对每个冲突返回：属实 / 不属实 / 需澄清。
