# =============================================================================
# Prompt: prd/l2/insufficient_constant_packing
# 用途：检测文档中是否有未声明为 PARAM / CONFIG 的硬编码常量
# 状态：experimental — 结果可能包含误报
# =============================================================================

main: |
  你是一个 PRD 审查助手。请检查以下文档中是否存在"硬编码但未声明为 PARAM 或 CONFIG"的常量。

  检查目标（必须同时满足以下条件才报告）：
  1. 文档中明确写出了一个数值、字符串字面量
  2. 这个值看起来像是可配置项（超时时间、阈值、次数、名称、地址等）
  3. 这个值在文档中没有对应的 [PARAM:xxx=...] 或 [CONFIG:...] 声明

  不报告：
  - 明显不是配置项的值（如"3 个字符""第 1 步"）
  - 已经声明了 PARAM 或 CONFIG 的值

  格式：
  - 硬编码值
  - 位置（章节标题）
  - 建议的 PARAM 名称

  如果无遗漏，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---
