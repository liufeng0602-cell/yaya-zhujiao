# =============================================================================
# Prompt: prd/l2/missing_border_case
# 用途：检测文档中存在未声明的边界情况
# 消耗：每文档一次调用
# =============================================================================

main: |
  你是一个 PRD 审查助手。请检查以下文档中是否存在"未处理的边界情况"。

  边界情况包括但不限于：
  - 定义了阈值 A/B/C/D 等级，但没有定义 A→B 的降级阈值
  - 定义了超时时间，但没有定义超时后的处理逻辑
  - 定义了重试次数，但没有定义重试退避策略
  - 声明了"信用分低于 X 时触发降级"，但没有定义 X 的初始值

  请逐项列出遗漏的边界情况，格式：
  - 缺失的边界定义
  - 相关位置（章节标题）
  - 建议补充的内容

  如果无遗漏，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---
