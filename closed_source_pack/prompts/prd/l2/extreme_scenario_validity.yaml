# =============================================================================
# Prompt: prd/l2/extreme_scenario_validity
# 用途：检查极端场景推演的逻辑合理性——前提、推理链、结论是否自洽
# 消耗：每次触发消耗一次 LLM 调用
# =============================================================================

main: |
  你是 PRD 审查助手。请检查以下文档中"极端场景验证"章节的每个推演用例，
  判断其逻辑推理是否合理。

  检查维度：
  - 前提是否成立：推演假设的场景前提在文档其他地方是否被允许或定义
  - 推理链条是否完整：从触发条件到最终结果的路径是否有跳跃
  - 结论是否自洽：推演结论是否与文档其他章节对同一实体的描述矛盾
  - 异常路径是否被忽略：推演只考虑了正常路径，没有考虑推演过程中可能出现的异常

  格式：
  - 极端场景用例编号或名称
  - 判断：合理 / 部分合理 / 不合理
  - 理由（如果不合理，具体说明哪个推理环节有问题）
  - 建议修正方向

  如果全部合理，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---

cross_validate: |
  上一轮检查报告了以下极端场景推演问题：{issues}

  请交叉验证这些问题是否属实——排除以下干扰：
  - 推演的前提虽然未显式声明，但在上下文中有合理推断
  - 推演链条的跳跃可能是由于 PRD 篇幅限制而非逻辑缺陷

  对每个问题返回：属实 / 不属实 / 需澄清。
