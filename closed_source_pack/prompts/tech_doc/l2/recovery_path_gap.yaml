# =============================================================================
# Prompt: tech_doc/l2/recovery_path_gap
# 用途：检查技术文档中错误恢复路径是否完整——每个错误场景都有对应恢复策略
# 消耗：每次触发消耗一次 LLM 调用
# =============================================================================

main: |
  你是技术文档审查助手。请检查以下文档中声明的错误码或异常场景，
  是否有对应的恢复路径或重试策略。

  检查要点：
  - 文档中列出了哪些错误码或异常
  - 每个错误是否说明了调用方应如何处理（重试、降级、报错、回滚等）
  - 对于 5xx 系统错误，是否说明了系统内部恢复机制
  - 对于 4xx 客户端错误，是否说明了调用方应修正的内容
  - 重试语义是否明确（是否可以重试、重试间隔如何、幂等性如何保证）

  格式：
  - 错误码/异常名称
  - 状态：已定义恢复路径 / 恢复路径缺失 / 恢复路径模糊
  - 如果缺失或模糊：建议补充什么内容

  如果全部完整，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---

cross_validate: |
  上一轮检查报告了以下恢复路径缺失：{issues}

  请交叉验证——排除以下干扰：
  - 恢复策略不是写在错误码章节，而是分散在调用端说明中
  - 某些错误是业务逻辑错误，不需要调用方处理（仅用于监控告警）

  对每个问题返回：属实 / 不属实 / 需澄清（说明原因）。
