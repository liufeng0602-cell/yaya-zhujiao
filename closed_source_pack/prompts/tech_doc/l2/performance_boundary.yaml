# =============================================================================
# Prompt: tech_doc/l2/performance_boundary
# 用途：检测技术文档中是否存在未量化边界的模糊性能描述
# 消耗：每次触发消耗一次 LLM 调用
# =============================================================================

main: |
  你是技术文档审查助手。请检查以下文档中是否存在"模糊的性能描述"——
  即使用了定性词但未给出具体的量化边界。

  典型模糊词且需要量化的场景：
  - "高并发" — 需要给出具体 QPS/TPS 数值
  - "低延迟" — 需要给出具体的毫秒级目标
  - "大量数据" — 需要给出数据量级（千/万/百万）
  - "快速响应" — 需要给出具体超时阈值
  - "实时处理" — 需要定义实时的时间窗口
  - "高频调用" — 需要给出调用频率上限
  - 任何与 glossary 术语相关的描述（如响应时间、请求速率），
    如果只写了定性描述但没有给出符合 glossary 约束的具体值

  格式：
  - 出现位置（章节标题 + 段落）
  - 模糊词原文
  - 对应的 glossary 术语（如有）
  - 建议量化的方向

  如果没有模糊描述，返回空。

  --- 文档内容开始 ---
  {doc_text}
  --- 文档内容结束 ---

cross_validate: |
  上一轮检查报告了以下模糊性能描述：{issues}

  请交叉验证——排除以下干扰：
  - 某些"高并发"描述是在功能概述中，接口规范章节已给出具体值
  - 某些描述在上下文中有隐含的量化（如 X 系统的吞吐上限已在前文定义）

  对每个问题返回：属实 / 不属实 / 需澄清（说明原因）。
