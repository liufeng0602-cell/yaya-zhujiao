# 自我进化规则
# 每条规则包含 scope、pre_flight（writer 自检用）、post_flight（reviewer 审核用）
# scope: universal（通用规则，可开源）
# scope: project（项目特定规则，不开源）

rules:

  # --- 通用规则（scope: universal，可开源） ---

  - id: R001
    scope: universal
    hit_count: 0
    total_rounds: 0
    pre_flight:
      check: "grep 所有 AI-MUTABLE 参数名，确认每个参数全文只出现一种默认值"
      severity: P1
    post_flight:
      check: "AI-MUTABLE 参数默认值是否全文唯一"
      severity: P1

  - id: R002
    scope: universal
    hit_count: 0
    total_rounds: 0
    pre_flight:
      check: "grep 信用分初始值（=50/=50/初始值=50），全文一致"
      severity: P2
    post_flight:
      check: "信用分初始值是否全文一致"
      severity: P2

  - id: R003
    scope: universal
    hit_count: 0
    total_rounds: 0
    pre_flight:
      check: "grep '待 SXX 定义' 标记，确认 SXX 已封版或有兜底策略"
      severity: P1
    post_flight:
      check: "所有 '待 SXX 定义' 标记是否有兜底策略"
      severity: P1

  - id: R004
    scope: universal
    hit_count: 0
    total_rounds: 0
    pre_flight:
      check: "grep 所有版本号引用，与目标文档头部一致"
      severity: P2
    post_flight:
      check: "版本号引用是否与目标文档头部一致"
      severity: P2

  - id: R005
    scope: universal
    hit_count: 0
    total_rounds: 0
    pre_flight:
      check: "grep 所有硬编码行号（如 L180），无残留"
      severity: P2
    post_flight:
      check: "硬编码行号残留"
      severity: P2

  # --- 项目特定规则（scope: project，不开源） ---
  
  - id: R101
    scope: project
    project: yaya-zhujiao
    hit_count: 0
    total_rounds: 0
    pre_flight:
      check: "确认已读取 NORTH_STAR.md，在自检声明中列出 '待本系统定义' 条目清单"
      severity: P2
    post_flight:
      check: "自检声明中是否包含 NORTH_STAR 待定义条目清单"
      severity: P2
